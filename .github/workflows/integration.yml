name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration:
    name: Tests against paddles + PostgreSQL
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: paddles
          POSTGRES_PASSWORD: paddles
          POSTGRES_DB: paddles
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PADDLES_SQLALCHEMY_URL: postgresql+psycopg://paddles:paddles@localhost:5432/paddles
      PADDLES_SERVER_HOST: 127.0.0.1
      PADDLES_SERVER_PORT: "8080"
      PADDLES_ADDRESS: http://127.0.0.1:8080
      # pecan serve is single-process; concurrent integration tests need workers
      PADDLES_WORKER_COUNT: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e .

      - name: Configure application
        run: |
          cp config.py.in config.py
          cp alembic.ini.in alembic.ini

      - name: Initialize database
        run: |
          pecan populate config.py
          CURRENT=$(alembic current 2>/dev/null || true)
          if [ -z "$CURRENT" ]; then
            alembic stamp head
          else
            alembic upgrade head
          fi

      - name: Start paddles server
        run: |
          nohup gunicorn_pecan -c gunicorn_config.py config.py > paddles-server.log 2>&1 &
          echo $! > paddles.pid

      - name: Wait for paddles server
        run: |
          for i in $(seq 1 60); do
            if curl -sf "${PADDLES_ADDRESS}/" > /dev/null; then
              echo "Paddles server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Paddles server failed to start"
          cat paddles-server.log
          exit 1

      - name: Run tests
        run: |
          pytest -v paddles --paddles-server="${PADDLES_ADDRESS}"

      - name: Stop paddles server
        if: always()
        run: |
          if [ -f paddles.pid ]; then
            kill "$(cat paddles.pid)" || true
          fi
          if [ -f paddles-server.log ]; then
            echo "=== paddles server log ==="
            cat paddles-server.log
          fi
